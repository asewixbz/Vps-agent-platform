services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - redis
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  redis-data:
